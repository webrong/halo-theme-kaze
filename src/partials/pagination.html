<div
  class="photo-pagination"
  th:if="${posts != null and posts.totalPages gt 1}"
  th:with="urlSrc=${posts.nextUrl ?: posts.prevUrl}, baseUrl=${#strings.contains(urlSrc, '/page/') ? #strings.substringBefore(urlSrc, '/page/') : '/'}"
>
  <a class="page-prev" th:if="${posts.hasPrevious()}" th:href="@{${posts.prevUrl}}">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    上一页
  </a>
  <span
    class="page-prev"
    th:if="${!posts.hasPrevious()}"
    style="color: #d1d5db; cursor: not-allowed"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    上一页
  </span>
  <div class="page-numbers">
    <!-- 5页以内：全部显示 -->
    <th:block th:if="${posts.totalPages <= 5}">
      <th:block th:each="pageNum : ${#numbers.sequence(1, posts.totalPages)}">
        <a
          th:if="${pageNum == 1}"
          class="page-btn"
          th:classappend="${pageNum == posts.page} ? 'active'"
          th:href="@{${baseUrl}}"
          th:text="${pageNum}"
        ></a>
        <a
          th:if="${pageNum != 1}"
          class="page-btn"
          th:classappend="${pageNum == posts.page} ? 'active'"
          th:href="@{${baseUrl + '/page/' + pageNum}}"
          th:text="${pageNum}"
        ></a>
      </th:block>
    </th:block>
    <!-- 超过5页：省略号分页 -->
    <th:block th:if="${posts.totalPages gt 5}" th:with="cur=${posts.page}, last=${posts.totalPages}">
      <a
        class="page-btn"
        th:classappend="${cur == 1} ? 'active'"
        th:href="@{${baseUrl}}"
        >1</a
      >
      <span class="page-ellipsis" th:if="${cur gt 4}">...</span>
      <a
        th:if="${cur gt 3 and cur le last}"
        class="page-btn"
        th:href="@{${baseUrl + '/page/' + (cur - 2)}}"
        th:text="${cur - 2}"
      ></a>
      <a
        th:if="${cur gt 2 and cur le last}"
        class="page-btn"
        th:href="@{${baseUrl + '/page/' + (cur - 1)}}"
        th:text="${cur - 1}"
      ></a>
      <a
        th:if="${cur gt 1 and cur lt last}"
        class="page-btn active"
        th:href="@{${baseUrl + '/page/' + cur}}"
        th:text="${cur}"
      ></a>
      <a
        th:if="${last - cur gt 1}"
        class="page-btn"
        th:href="@{${baseUrl + '/page/' + (cur + 1)}}"
        th:text="${cur + 1}"
      ></a>
      <a
        th:if="${last - cur gt 2}"
        class="page-btn"
        th:href="@{${baseUrl + '/page/' + (cur + 2)}}"
        th:text="${cur + 2}"
      ></a>
      <span class="page-ellipsis" th:if="${last - cur gt 3}">...</span>
      <a
        class="page-btn"
        th:classappend="${cur == last} ? 'active'"
        th:href="@{${baseUrl + '/page/' + last}}"
        th:text="${last}"
      ></a>
    </th:block>
  </div>
  <a class="page-next" th:if="${posts.hasNext()}" th:href="@{${posts.nextUrl}}">
    下一页
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m9 18 6-6-6-6" />
    </svg>
  </a>
  <span class="page-next" th:if="${!posts.hasNext()}" style="color: #d1d5db; cursor: not-allowed">
    下一页
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m9 18 6-6-6-6" />
    </svg>
  </span>
</div>

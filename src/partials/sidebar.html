<aside class="sidebar">
  <!-- Author card -->
  <div class="sidebar-card sidebar-author" th:if="${!#strings.isEmpty(theme.config.profile?.avatar) or !#strings.isEmpty(theme.config.profile?.display_name)}">
    <img
      th:if="${!#strings.isEmpty(theme.config.profile?.avatar)}"
      class="sidebar-author-avatar"
      th:src="${theme.config.profile.avatar}"
      th:alt="${theme.config.profile.display_name}"
      loading="lazy"
    />
    <div class="sidebar-author-info" th:if="${!#strings.isEmpty(theme.config.profile?.display_name)}">
      <h3 class="sidebar-author-name" th:text="${theme.config.profile.display_name}"></h3>
      <p class="sidebar-author-bio" th:if="${!#strings.isEmpty(theme.config.profile?.bio)}" th:text="${theme.config.profile.bio}"></p>
    </div>
    <!-- Social icons -->
    <div class="sidebar-author-social" th:if="${theme.config.social != null}">
      <a th:if="${!#strings.isEmpty(theme.config.social?.github)}" th:href="${theme.config.social.github}" target="_blank" rel="noopener" aria-label="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
      </a>
      <a th:if="${!#strings.isEmpty(theme.config.social?.twitter)}" th:href="${theme.config.social.twitter}" target="_blank" rel="noopener" aria-label="Twitter">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      </a>
      <a th:if="${!#strings.isEmpty(theme.config.social?.email)}" th:href="'mailto:' + ${theme.config.social.email}" aria-label="Email">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      </a>
      <a th:if="${!#strings.isEmpty(theme.config.social?.bilibili)}" th:href="${theme.config.social.bilibili}" target="_blank" rel="noopener" aria-label="Bilibili">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7.5V20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7.5"/><path d="M7 2l3 5h4l3-5"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/></svg>
      </a>
      <a th:if="${!#strings.isEmpty(theme.config.social?.website)}" th:href="${theme.config.social.website}" target="_blank" rel="noopener" aria-label="Website">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </a>
    </div>
  </div>

  <!-- Categories -->
  <div class="sidebar-card sidebar-categories" th:if="${categoryFinder != null and !#lists.isEmpty(categoryFinder.listAll())}">
    <h3 class="sidebar-card-title">分类</h3>
    <ul class="sidebar-categories-list">
      <li th:each="cat : ${categoryFinder.listAll()}">
        <a th:href="${cat.status.permalink}" th:text="${cat.spec.displayName}"></a>
        <span class="sidebar-categories-count" th:if="${cat.postCount != null}" th:text="${cat.postCount}"></span>
      </li>
    </ul>
  </div>

  <!-- Tags cloud -->
  <div class="sidebar-card sidebar-tags" th:if="${tagFinder != null and !#lists.isEmpty(tagFinder.listAll())}">
    <h3 class="sidebar-card-title">标签</h3>
    <div class="sidebar-tags-list">
      <a
        th:each="tag : ${tagFinder.listAll()}"
        class="sidebar-tag-pill"
        th:href="${tag.status.permalink}"
        th:text="${tag.spec.displayName}"
      ></a>
    </div>
  </div>

  <!-- Recent posts -->
  <div
    class="sidebar-card sidebar-recent"
    th:with="recentPosts = ${postFinder.list({page: 1, size: 5, sort: {'spec.publishTime,desc'}})}"
    th:if="${recentPosts != null and !#lists.isEmpty(recentPosts.items)}"
  >
    <h3 class="sidebar-card-title">最新文章</h3>
    <ul class="sidebar-recent-list">
      <li th:each="post : ${recentPosts.items}">
        <a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}"></a>
        <time th:text="${#temporals.format(post.spec.publishTime, 'M月d日')}"></time>
      </li>
    </ul>
  </div>
</aside>

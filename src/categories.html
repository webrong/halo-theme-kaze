<include src="layout.html">
  <template name="seo">
    <meta name="description" th:content="${!#strings.isEmpty(theme.config.basic.meta_description) ? theme.config.basic.meta_description : site.subtitle}" />
    <link rel="canonical" th:href="@{/categories}" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="分类" />
    <meta property="og:description" th:content="${!#strings.isEmpty(theme.config.basic.meta_description) ? theme.config.basic.meta_description : site.subtitle}" />
    <meta property="og:url" th:content="@{/categories}" />
    <meta th:if="${theme.config.hero.hero_image}" property="og:image" th:content="${theme.config.hero.hero_image}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="分类" />
    <meta name="twitter:description" th:content="${!#strings.isEmpty(theme.config.basic.meta_description) ? theme.config.basic.meta_description : site.subtitle}" />
    <meta th:if="${theme.config.hero.hero_image}" name="twitter:image" th:content="${theme.config.hero.hero_image}" />
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "首页", "item": /*[[${site.url}]]*/ "" },
          { "@type": "ListItem", "position": 2, "name": "分类" }
        ]
      }
    </script>
  </template>
  <template name="head">
    <title th:text="|Categories - ${site.title}|">分类</title>
  </template>

  <div class="categories-page">
    <div class="section-header" style="margin-bottom: 40px">
      <div>
        <h1 class="section-title" style="font-size: 32px">分类</h1>
        <p class="section-subtitle">按分类浏览所有文章。</p>
      </div>
    </div>

    <div class="categories-grid" th:if="${categories != null}">
      <a th:each="cat : ${categories}" th:href="@{${cat.status.permalink}}" class="category-card">
        <div class="category-card-header">
          <h3 class="category-card-name" th:text="${cat.spec.displayName}"></h3>
          <span class="category-card-count" th:text="${cat.postCount ?: 0}">0</span>
        </div>
        <p
          class="category-card-desc"
          th:if="${cat.spec.description}"
          th:text="${cat.spec.description}"
        ></p>
        <!-- Children categories -->
        <div class="category-children" th:if="${!#lists.isEmpty(cat?.children)}">
          <a
            th:each="child : ${cat.children}"
            th:href="@{${child.status.permalink}}"
            class="category-child-link"
          >
            <span th:text="${child.spec.displayName}"></span>
            <span class="category-child-count" th:text="${child.postCount}">0</span>
          </a>
        </div>
      </a>
    </div>
  </div>
</include>

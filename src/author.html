<include src="layout.html">
  <template name="seo">
    <meta name="description" th:content="${author.spec.bio ?: site.subtitle}" />
    <link rel="canonical" th:href="${author.status.permalink}" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta property="og:type" content="profile" />
    <meta property="og:title" th:content="${author.spec.displayName}" />
    <meta property="og:description" th:content="${author.spec.bio ?: site.subtitle}" />
    <meta property="og:url" th:content="${author.status.permalink}" />
    <meta th:if="${author.spec.avatar}" property="og:image" th:content="${author.spec.avatar}" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" th:content="${author.spec.displayName}" />
    <meta name="twitter:description" th:content="${author.spec.bio ?: site.subtitle}" />
    <meta th:if="${author.spec.avatar}" name="twitter:image" th:content="${author.spec.avatar}" />
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": /*[[${author.spec.displayName}]]*/ "",
        "url": /*[[${author.status.permalink}]]*/ "",
        "image": /*[[${author.spec.avatar}]]*/ "",
        "description": /*[[${author.spec.bio}]]*/ ""
      }
    </script>
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "首页", "item": /*[[${site.url}]]*/ "" },
          { "@type": "ListItem", "position": 2, "name": /*[[${author.spec.displayName}]]*/ "" }
        ]
      }
    </script>
  </template>
  <template name="head">
    <title th:text="|${author.spec.displayName} - ${site.title}|">Author</title>
  </template>

  <div class="author-page" th:if="${author != null}">
    <div class="author-header">
      <img
        class="author-avatar"
        th:src="${author.spec.avatar ?: theme.config.profile.avatar}"
        th:alt="${author.spec.displayName}"
        width="96"
        height="96"
        loading="lazy"
      />
      <div class="author-info">
        <h1 class="author-name" th:text="${author.spec.displayName}"></h1>
        <p class="author-bio" th:if="${author.spec.bio}" th:text="${author.spec.bio}"></p>
        <div class="author-meta">
          <span th:if="${author.spec.email}">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <a th:href="'mailto:' + ${author.spec.email}" th:text="${author.spec.email}"></a>
          </span>
          <span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span><span th:text="${posts?.total ?: 0}">0</span> 篇文章</span>
          </span>
        </div>
      </div>
    </div>

    <div class="post-grid">
      <include src="post-card.html"></include>
    </div>

    <include src="pagination.html"></include>
  </div>
</include>

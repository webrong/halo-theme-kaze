<include src="layout.html">
  <template name="seo">
    <meta name="description" th:content="${site.subtitle}" />
    <link rel="canonical" th:href="${singlePage.status.permalink}" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${singlePage.spec.title}" />
    <meta property="og:description" th:content="${site.subtitle}" />
    <meta property="og:url" th:content="${singlePage.status.permalink}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${singlePage.spec.title}" />
    <meta name="twitter:description" th:content="${site.subtitle}" />
  </template>
  <template name="head">
    <title th:text="|${singlePage.spec.title} - ${site.title}|">页面标题</title>
  </template>

  <!-- ==================== About Page (slug: about) ==================== -->
  <th:block th:if="${singlePage.spec.slug == 'about'}" th:replace="~{page_about :: #about-content}">
  </th:block>

  <!-- ==================== Default Page ==================== -->
  <th:block th:if="${singlePage.spec.slug != 'about'}">
    <div class="page-content-wrapper">
      <div class="post-detail">
        <article>
          <header class="article-header">
            <h1 class="article-title" th:text="${singlePage.spec.title}"></h1>
          </header>
          <div class="article-content" th:if="${singlePage.content != null and singlePage.content.content != null}" th:utext="${singlePage.content.content}"></div>
        </article>
        <div th:if="${haloCommentEnabled}">
          <halo:comment group="content.halo.run" kind="SinglePage" th:attr="name=${singlePage.metadata.name}" />
        </div>
      </div>
    </div>
  </th:block>
</include>

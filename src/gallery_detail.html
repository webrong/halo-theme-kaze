<include src="layout.html">
  <template name="seo">
    <meta name="description" th:content="${album.spec.description ?: site.subtitle}" />
    <link rel="canonical" th:href="${album.status.permalink}" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${album.spec.displayName}" />
    <meta property="og:description" th:content="${album.spec.description ?: site.subtitle}" />
    <meta property="og:url" th:content="${album.status.permalink}" />
    <meta th:if="${theme.config.hero.hero_image}" property="og:image" th:content="${theme.config.hero.hero_image}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${album.spec.displayName}" />
    <meta name="twitter:description" th:content="${album.spec.description ?: site.subtitle}" />
    <meta th:if="${theme.config.hero.hero_image}" name="twitter:image" th:content="${theme.config.hero.hero_image}" />
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "首页", "item": /*[[${site.url}]]*/ "" },
          { "@type": "ListItem", "position": 2, "name": "摄影", "item": /*[[${site.url + '/photography'}]]*/ "" },
          { "@type": "ListItem", "position": 3, "name": /*[[${album.spec.displayName}]]*/ "" }
        ]
      }
    </script>
  </template>
  <template name="head">
    <title th:text="|${album.spec.displayName} - ${site.title}|">相册</title>
  </template>

  <div class="photography-page">
    <div class="section-header" style="margin-bottom: 32px; align-items: flex-start">
      <div>
        <h1 class="section-title" style="font-size: 32px" th:text="${album.spec.displayName}">
          相册
        </h1>
        <p
          class="section-subtitle"
          th:if="${album.spec.description}"
          th:text="${album.spec.description}"
        >
          Description
        </p>
      </div>
      <a th:href="@{/photography}" class="back-link">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m12 19-7-7 7-7" />
          <path d="M19 12H5" />
        </svg>
        返回相册
      </a>
    </div>

    <div class="photo-grid">
      <div
        class="photo-card"
        th:each="photo : ${photos.items}"
        th:data-index="${photoStat.index}"
        th:data-src="${photo.spec.url}"
        th:data-caption="${photo.spec.title}"
      >
        <img
          th:src="${#strings.isEmpty(photo.spec.thumbnail) ? photo.spec.url : photo.spec.thumbnail}"
          th:alt="${photo.spec.title}"
          width="600"
          height="400"
          loading="lazy"
        />
        <div class="photo-card-overlay">
          <div class="photo-card-eye">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="pagination" th:if="${photos.hasPrevious() or photos.hasNext()}">
      <a class="page-prev" th:if="${photos.hasPrevious()}" th:href="@{${photos.prevUrl}}">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
        上一页
      </a>
      <span
        class="page-prev"
        th:if="${!photos.hasPrevious()}"
        style="color: #d1d5db; cursor: not-allowed"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
        上一页
      </span>
      <span
        th:text="|${photos.page} / ${photos.totalPages}|"
        style="font-variant-numeric: tabular-nums"
      ></span>
      <a class="page-next" th:if="${photos.hasNext()}" th:href="@{${photos.nextUrl}}">
        下一页
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      </a>
      <span
        class="page-next"
        th:if="${!photos.hasNext()}"
        style="color: #d1d5db; cursor: not-allowed"
      >
        下一页
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      </span>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <div class="lightbox-modal">
        <!-- Top bar -->
        <div class="lightbox-topbar">
          <div class="lightbox-topbar-info">
            <span class="lightbox-topbar-title" id="lightboxTitle"></span>
            <span class="lightbox-topbar-counter" id="lightboxCounter"></span>
          </div>
          <button class="lightbox-close-btn" id="lightboxClose" aria-label="关闭">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>

        <!-- Image area -->
        <div class="lightbox-image-area">
          <button class="lightbox-nav-btn lightbox-prev-btn" id="lightboxPrev" aria-label="上一张">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
          <img id="lightboxImg" src="" alt="" />
          <button class="lightbox-nav-btn lightbox-next-btn" id="lightboxNext" aria-label="下一张">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m9 18 6-6-6-6" />
            </svg>
          </button>
        </div>

        <!-- Caption + thumbnails -->
        <div class="lightbox-bottom">
          <p class="lightbox-caption" id="lightboxCaption"></p>
          <div class="lightbox-thumbs" id="lightboxThumbs"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/gallery-detail.ts"></script>
</include>

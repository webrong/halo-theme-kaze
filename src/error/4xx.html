<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title th:text="|${error.status} - ${site.title}|">访问被拒绝</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        color: #111827;
      }
      .error-content {
        text-align: center;
        padding: 40px 20px;
        max-width: 480px;
      }
      .error-code {
        font-size: 96px;
        font-weight: 700;
        color: #2563eb;
        line-height: 1;
        margin-bottom: 16px;
      }
      .error-message {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .error-description {
        font-size: 15px;
        color: #6b7280;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .error-home-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 24px;
        background: #2563eb;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.2s;
      }
      .error-home-btn:hover {
        background: #1d4ed8;
      }
      .error-home-btn svg {
        width: 14px;
        height: 14px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f9fafb;
        }
        .error-description {
          color: #9ca3af;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-content">
      <h1 class="error-code" th:text="${error.status}">403</h1>
      <p class="error-message" th:text="${error.title}">访问被拒绝</p>
      <p class="error-description" th:text="${error.detail}">您没有权限访问此页面。</p>
      <a class="error-home-btn" th:href="@{/}">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
        返回首页
      </a>
    </div>
  </body>
</html>

<include src="layout.html">
  <template name="seo">
    <meta name="description" th:content="${!#strings.isEmpty(theme.config.basic.meta_description) ? theme.config.basic.meta_description : site.subtitle}" />
    <link rel="canonical" th:href="@{/archives}" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="归档" />
    <meta property="og:description" th:content="${!#strings.isEmpty(theme.config.basic.meta_description) ? theme.config.basic.meta_description : site.subtitle}" />
    <meta property="og:url" th:content="@{/archives}" />
    <meta th:if="${theme.config.hero.hero_image}" property="og:image" th:content="${theme.config.hero.hero_image}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="归档" />
    <meta name="twitter:description" th:content="${!#strings.isEmpty(theme.config.basic.meta_description) ? theme.config.basic.meta_description : site.subtitle}" />
    <meta th:if="${theme.config.hero.hero_image}" name="twitter:image" th:content="${theme.config.hero.hero_image}" />
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "首页", "item": /*[[${site.url}]]*/ "" },
          { "@type": "ListItem", "position": 2, "name": "归档" }
        ]
      }
    </script>
  </template>
  <template name="head">
    <title th:text="|Archives - ${site.title}|">归档</title>
  </template>

  <div class="archive-page">
    <div class="section-header" style="margin-bottom: 40px">
      <div>
        <h1 class="section-title" style="font-size: 32px">归档</h1>
        <p class="section-subtitle">按时间浏览所有文章。</p>
      </div>
    </div>

    <div class="archive-timeline">
      <th:block th:each="archive : ${archives.items}">
        <th:block th:each="month : ${archive.months}">
          <div class="archive-group">
            <div class="archive-group-header">
              <span
                class="archive-group-label"
                th:text="${archive.year} + ' / ' + ${month.month}"
              ></span>
              <span
                class="archive-group-count"
                th:text="${#lists.size(month.posts)} + ' 篇文章'"
              ></span>
            </div>
            <div class="archive-posts">
              <a
                th:each="post : ${month.posts}"
                th:href="@{${post.status.permalink}}"
                class="archive-post-item"
                target="_blank"
                rel="noopener"
              >
                <span
                  class="archive-post-day"
                  th:text="${#temporals.format(post.spec.publishTime, 'dd')}"
                ></span>
                <span class="archive-post-title" th:text="${post.spec.title}"></span>
              </a>
            </div>
          </div>
        </th:block>
      </th:block>
    </div>

    <div class="pagination" th:if="${archives.hasPrevious() or archives.hasNext()}">
      <a class="page-prev" th:if="${archives.hasPrevious()}" th:href="@{${archives.prevUrl}}">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
        上一页
      </a>
      <span
        class="page-prev"
        th:if="${!archives.hasPrevious()}"
        style="color: #d1d5db; cursor: not-allowed"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
        上一页
      </span>
      <span
        th:text="|${archives.page} / ${archives.totalPages}|"
        style="font-variant-numeric: tabular-nums"
      ></span>
      <a class="page-next" th:if="${archives.hasNext()}" th:href="@{${archives.nextUrl}}">
        下一页
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      </a>
      <span
        class="page-next"
        th:if="${!archives.hasNext()}"
        style="color: #d1d5db; cursor: not-allowed"
      >
        下一页
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m9 18 6-6-6-6" />
        </svg>
      </span>
    </div>
  </div>
</include>

<include src="layout.html">
  <template name="seo">
    <meta name="description" th:content="${category.spec.description ?: site.subtitle}" />
    <link rel="canonical" th:href="${category.status.permalink}" />
    <meta property="og:site_name" th:content="${site.title}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${category.spec.displayName}" />
    <meta property="og:description" th:content="${category.spec.description ?: site.subtitle}" />
    <meta property="og:url" th:content="${category.status.permalink}" />
    <meta th:if="${theme.config.hero.hero_image}" property="og:image" th:content="${theme.config.hero.hero_image}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${category.spec.displayName}" />
    <meta name="twitter:description" th:content="${category.spec.description ?: site.subtitle}" />
    <meta th:if="${theme.config.hero.hero_image}" name="twitter:image" th:content="${theme.config.hero.hero_image}" />
    <script type="application/ld+json" th:inline="javascript">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "首页", "item": /*[[${site.url}]]*/ "" },
          { "@type": "ListItem", "position": 2, "name": "分类", "item": /*[[${site.url + '/categories'}]]*/ "" },
          { "@type": "ListItem", "position": 3, "name": /*[[${category.spec.displayName}]]*/ "" }
        ]
      }
    </script>
  </template>
  <template name="head">
    <title th:text="|${category.spec.displayName} - ${site.title}|">分类</title>
  </template>

  <div class="category-page" th:if="${category != null}">
    <div class="section-header" style="margin-bottom: 40px">
      <div>
        <div class="tag-page-badge">分类</div>
        <h1
          class="section-title"
          style="font-size: 32px"
          th:text="${category.spec.displayName}"
        ></h1>
        <p
          class="section-subtitle"
          th:if="${category.spec.description}"
          th:text="${category.spec.description}"
        ></p>
        <p class="section-subtitle"><span th:text="${posts?.total ?: 0}">0</span> 篇文章</p>
      </div>
    </div>

    <div class="post-grid">
      <include src="post-card.html"></include>
    </div>

    <include src="pagination.html"></include>
  </div>
</include>
